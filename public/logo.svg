<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main background -->
  <rect width="512" height="512" rx="110" fill="url(#bgGradient)"/>
  
  <!-- Abstract "A" shape representing SummonIQ -->
  <g transform="translate(256, 256)">
    <!-- Central triangle for "A" -->
    <path d="M 0,-120 L 80,100 L 60,100 L 40,60 L -40,60 L -60,100 L -80,100 Z" fill="white"/>
    
    <!-- Horizontal bar in "A" -->
    <rect x="-30" y="20" width="60" height="20" rx="4" fill="url(#accentGradient)"/>
    
    <!-- Three connected nodes representing orchestration -->
    <g opacity="0.9">
      <!-- Node 1 (top right) -->
      <circle cx="60" cy="-80" r="14" fill="white"/>
      <circle cx="60" cy="-80" r="8" fill="url(#accentGradient)"/>
      
      <!-- Node 2 (bottom right) -->
      <circle cx="85" cy="40" r="14" fill="white"/>
      <circle cx="85" cy="40" r="8" fill="url(#accentGradient)"/>
      
      <!-- Node 3 (left) -->
      <circle cx="-70" cy="-20" r="14" fill="white"/>
      <circle cx="-70" cy="-20" r="8" fill="url(#accentGradient)"/>
      
      <!-- Connecting lines -->
      <line x1="60" y1="-80" x2="85" y2="40" stroke="white" stroke-width="3" opacity="0.4"/>
      <line x1="-70" y1="-20" x2="60" y2="-80" stroke="white" stroke-width="3" opacity="0.4"/>
      <line x1="-70" y1="-20" x2="85" y2="40" stroke="white" stroke-width="3" opacity="0.4"/>
    </g>
  </g>
  
  <!-- Subtle shadow for depth -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="white" stroke-width="2" opacity="0.1"/>
</svg>
